<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Switchboard settings</title>
</head>
<body>
  <div id="switchboard-root"></div>
  <script src="/panel.js"></script>
  <script>
    SwitchboardPanel.createPanel({ element: document.getElementById('switchboard-root') }).refresh().catch((error) => {
      document.getElementById('switchboard-root').textContent = `Switchboard could not load: ${error.message}`;
    });
  </script>
</body>
</html>
