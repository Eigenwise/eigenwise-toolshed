<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>sidequest — quest log</title>
<style>
  /* ============================================================= *
     sidequest dashboard — a quest log for the side issues you pick
     up mid-task. Deep-navy ink, one quest-gold accent, indigo/gold/
     mint marking To do -> Doing -> Done. Self-contained, no network.
   * ============================================================= */

  :root {
    --ink:        #0b0f1e;
    --ink-grad:   #10152b;
    --panel:      #121830;
    --panel-2:    #171e3a;
    --card:       #1a2140;
    --card-2:     #202950;
    --line:       #2a3459;
    --line-soft:  #202a49;
    --text:       #e9edfb;
    --text-dim:   #9aa6cc;
    --text-faint: #6a7599;

    --gold:       #f5b13d;
    --gold-bright:#ffca62;
    --gold-soft:  rgba(245,177,61,0.14);
    --gold-line:  rgba(245,177,61,0.42);

    --indigo:     #7c8cff;
    --mint:       #35d6a0;
    --urgent:     #ff5468;
    --high:       #ff9d42;
    --normal:     #7c8cff;
    --low:        #5f6a8c;

    --radius:     12px;
    --radius-sm:  9px;
    --shadow:     0 10px 30px -12px rgba(0,0,0,.7);
    --mono: ui-monospace, "Cascadia Code", "JetBrains Mono", "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--text);
    background:
      radial-gradient(1100px 640px at 82% -6%, rgba(124,140,255,.10), transparent 60%),
      radial-gradient(760px 520px at -4% 108%, rgba(245,177,61,.07), transparent 55%),
      linear-gradient(180deg, var(--ink-grad), var(--ink));
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--gold-soft); }
  :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 6px; }

  .app { display: grid; grid-template-columns: 248px 1fr; height: 100vh; }

  /* ---------- Left rail: brand + project switcher ---------- */
  .rail {
    display: flex; flex-direction: column; min-height: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.015), transparent), var(--panel);
    border-right: 1px solid var(--line-soft);
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 18px 18px 14px; }
  .brand .mark { color: var(--gold); width: 26px; height: 26px; flex: none; filter: drop-shadow(0 0 10px rgba(245,177,61,.35)); }
  .brand .word { font-weight: 700; letter-spacing: .01em; font-size: 15.5px; }
  .brand .word b { color: var(--gold); font-weight: 700; }
  .brand .tag { font-family: var(--mono); font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-faint); margin-top: 2px; }

  .rail-head { padding: 6px 18px 8px; font-family: var(--mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--text-faint); }
  .projects { flex: 1 1 auto; overflow-y: auto; padding: 2px 10px 10px; }
  .proj {
    width: 100%; text-align: left; cursor: pointer; display: block;
    background: transparent; border: 1px solid transparent; color: var(--text-dim);
    padding: 9px 11px; border-radius: var(--radius-sm); margin-bottom: 3px;
    font-family: inherit; font-size: 13px; transition: background .14s, border-color .14s, color .14s;
  }
  .proj:hover { background: var(--panel-2); color: var(--text); }
  .proj.active { background: var(--card); border-color: var(--line); color: var(--text); }
  .proj .row1 { display: flex; align-items: center; gap: 8px; }
  .proj .name { font-weight: 550; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; }
  .proj.active .name { color: var(--text); }
  .proj .count { font-family: var(--mono); font-size: 11px; color: var(--text-faint); flex: none; }
  .proj.active .count { color: var(--gold); }
  .proj .path { font-family: var(--mono); font-size: 10px; color: var(--text-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 3px; opacity: .85; }
  .proj .bar { display: flex; height: 3px; border-radius: 2px; overflow: hidden; margin-top: 8px; background: var(--line-soft); }
  .proj .bar i { display: block; height: 100%; }
  .proj .bar .t { background: var(--indigo); }
  .proj .bar .d { background: var(--gold); }
  .proj .bar .n { background: var(--mint); }
  /* Unread badge: how many tickets Claude changed in this board since you looked. */
  .newbadge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--gold); color: #241a05; font-family: var(--mono); font-size: 10.5px; font-weight: 700; box-shadow: 0 0 0 3px var(--gold-soft); flex: none; }
  .newbadge.pop { animation: badgepop .35s cubic-bezier(.2,.8,.3,1.2) both; }
  @keyframes badgepop { from { transform: scale(.4); opacity: 0; } }

  .rail-foot { padding: 12px; border-top: 1px solid var(--line-soft); display: flex; align-items: center; gap: 10px; }
  .live { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); letter-spacing: .04em; }
  .live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 0 0 rgba(53,214,160,.5); }
  .live.on .dot { animation: ping 2.4s ease-out infinite; }
  @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(53,214,160,.45);} 70%,100% { box-shadow: 0 0 0 6px rgba(53,214,160,0);} }

  /* ---------- Main ---------- */
  .main { min-width: 0; display: flex; flex-direction: column; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 16px 22px; border-bottom: 1px solid var(--line-soft); }
  .title-wrap { min-width: 0; }
  .title-wrap h1 { margin: 0; font-size: 18px; font-weight: 650; letter-spacing: -.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .title-wrap .sub { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .spacer { flex: 1 1 auto; }

  .search { position: relative; }
  .search input {
    width: 210px; max-width: 40vw; background: var(--panel); border: 1px solid var(--line-soft); color: var(--text);
    padding: 8px 11px 8px 30px; border-radius: 9px; font-family: var(--sans); font-size: 13px; transition: border-color .14s, background .14s;
  }
  .search input::placeholder { color: var(--text-faint); }
  .search input:focus { border-color: var(--gold-line); background: var(--panel-2); outline: none; }
  .search .ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; }

  .filters { display: flex; gap: 5px; }
  .chip {
    cursor: pointer; font-family: var(--mono); font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase;
    background: var(--panel); border: 1px solid var(--line-soft); color: var(--text-dim);
    padding: 6px 10px; border-radius: 999px; transition: all .13s;
  }
  .chip:hover { color: var(--text); border-color: var(--line); }
  .chip.active { color: var(--ink); background: var(--gold); border-color: var(--gold); font-weight: 600; }
  .chip .swatch { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  .iconbtn { cursor: pointer; background: var(--panel); border: 1px solid var(--line-soft); color: var(--text-dim); width: 36px; height: 35px; border-radius: 9px; display: inline-flex; align-items: center; justify-content: center; transition: all .13s; flex: none; }
  .iconbtn:hover { color: var(--text); border-color: var(--gold-line); }
  .iconbtn.on { color: var(--gold); border-color: var(--gold-line); }
  .iconbtn.off { color: var(--text-faint); }

  /* Notification settings popover */
  .popwrap { position: relative; }
  .popover { position: absolute; right: 0; top: 44px; width: 288px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); padding: 8px; z-index: 45; display: none; }
  .popover.show { display: block; }
  .pop-head { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); padding: 6px 8px 4px; }
  .pop-row { display: flex; align-items: flex-start; gap: 9px; padding: 8px; border-radius: 8px; cursor: pointer; }
  .pop-row:hover { background: var(--panel); }
  .pop-row input { margin-top: 2px; accent-color: var(--gold); width: 15px; height: 15px; flex: none; }
  .pop-row span { font-size: 13px; color: var(--text); display: flex; flex-direction: column; gap: 1px; }
  .pop-row em { font-style: normal; font-size: 11px; color: var(--text-faint); }
  .pop-foot { font-size: 10.5px; color: var(--text-faint); padding: 8px; line-height: 1.45; border-top: 1px solid var(--line-soft); margin-top: 4px; }

  /* Blocked indicator */
  .blockchip { font-family: var(--mono); font-size: 10px; color: var(--urgent); background: rgba(255,84,104,.10); border: 1px solid rgba(255,84,104,.32); padding: 2px 7px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }

  /* Comment thread + link pills (ticket detail modal) */
  .thread { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; padding-right: 2px; }
  .cmt { background: var(--ink); border: 1px solid var(--line-soft); border-radius: 9px; padding: 8px 10px; }
  .cmt.question { border-color: var(--gold-line); background: var(--gold-soft); }
  .cmt-head { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); margin-bottom: 4px; }
  .cmt-head .who { color: var(--text-dim); }
  .cmt.question .cmt-head .tag { color: var(--gold-bright); }
  .cmt-body { font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap; overflow-wrap: anywhere; }
  .cmt-empty { font-size: 12.5px; color: var(--text-faint); padding: 2px; }
  .addcmt { display: flex; gap: 8px; margin-top: 10px; align-items: flex-start; }
  .addcmt textarea { flex: 1; min-height: 40px; }
  .linklist { display: flex; flex-wrap: wrap; gap: 6px; }
  .linkpill { font-family: var(--mono); font-size: 11px; padding: 3px 4px 3px 8px; border-radius: 999px; border: 1px solid var(--line-soft); background: var(--ink); color: var(--text-dim); display: inline-flex; align-items: center; gap: 6px; }
  .linkpill .lt { color: var(--text-faint); }
  .linkpill.blocked-by { border-color: rgba(255,84,104,.35); }
  .linkpill.blocks { border-color: rgba(124,140,255,.35); }
  .linkpill .x { cursor: pointer; color: var(--text-faint); padding: 0 3px; border-radius: 4px; }
  .linkpill .x:hover { color: var(--urgent); background: rgba(255,84,104,.12); }
  .none { font-size: 12px; color: var(--text-faint); }

  .btn {
    cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 9px;
    padding: 8px 14px; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 7px; transition: all .13s;
  }
  .btn-primary { background: var(--gold); color: #241a05; box-shadow: 0 6px 18px -8px rgba(245,177,61,.7); }
  .btn-primary:hover { background: var(--gold-bright); }
  .btn-ghost { background: transparent; border-color: var(--line); color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); border-color: var(--gold-line); }
  .btn-danger { background: transparent; border-color: rgba(255,84,104,.4); color: var(--urgent); }
  .btn-danger:hover { background: rgba(255,84,104,.12); }

  /* ---------- Board ---------- */
  .board-scroll { flex: 1 1 auto; overflow: auto; padding: 20px 22px 28px; }
  .board { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(300px, 1fr); gap: 16px; min-height: 100%; align-items: start; }

  .col { background: linear-gradient(180deg, rgba(255,255,255,.012), transparent), var(--panel); border: 1px solid var(--line-soft); border-radius: var(--radius); display: flex; flex-direction: column; min-height: 220px; max-height: 100%; }
  .col-head { display: flex; align-items: center; gap: 9px; padding: 13px 14px 11px; }
  .col-head .flag { width: 3px; height: 15px; border-radius: 2px; }
  .col-head .h { font-family: var(--mono); font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
  .col-head .n { font-family: var(--mono); font-size: 11px; color: var(--text-faint); }
  .col[data-status="todo"] .flag { background: var(--indigo); }
  .col[data-status="doing"] .flag { background: var(--gold); }
  .col[data-status="done"] .flag { background: var(--mint); }
  .col-body { padding: 4px 10px 12px; overflow-y: auto; flex: 1 1 auto; display: flex; flex-direction: column; gap: 9px; }
  .col.drop-target { border-color: var(--gold-line); background: linear-gradient(180deg, var(--gold-soft), transparent 40%), var(--panel); }

  .empty { text-align: center; color: var(--text-faint); font-size: 12.5px; line-height: 1.6; padding: 26px 14px; border: 1px dashed var(--line-soft); border-radius: var(--radius-sm); margin: 4px; }
  .empty b { color: var(--text-dim); font-weight: 600; }

  /* ---------- Card ---------- */
  .card {
    position: relative; background: var(--card); border: 1px solid var(--line-soft); border-radius: var(--radius-sm);
    padding: 12px 13px 11px 15px; cursor: pointer; overflow: hidden;
    transition: border-color .14s, transform .12s, box-shadow .14s, background .14s;
  }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--normal); }
  .card[data-priority="urgent"]::before { background: var(--urgent); }
  .card[data-priority="high"]::before   { background: var(--high); }
  .card[data-priority="normal"]::before { background: var(--normal); }
  .card[data-priority="low"]::before    { background: var(--low); }
  .card:hover { border-color: var(--line); background: var(--card-2); transform: translateY(-1px); box-shadow: var(--shadow); }
  .card.dragging { opacity: .45; }
  .card.just-arrived { animation: pickup .9s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes pickup {
    0%   { opacity: 0; transform: translateY(8px) scale(.98); box-shadow: 0 0 0 0 rgba(245,177,61,.55); }
    55%  { opacity: 1; box-shadow: 0 0 0 5px rgba(245,177,61,.16); }
    100% { transform: translateY(0) scale(1); box-shadow: 0 0 0 0 rgba(245,177,61,0); }
  }

  .card .top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .ref { font-family: var(--mono); font-size: 10.5px; color: var(--gold); letter-spacing: .03em; }
  .card.just-arrived .ref { animation: refflash 1.2s ease-out both; }
  @keyframes refflash { 0%,30% { background: var(--gold-soft); box-shadow: 0 0 0 3px var(--gold-soft); border-radius: 4px; } 100% { background: transparent; box-shadow: none; } }
  .prio-tag { margin-left: auto; font-family: var(--mono); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; padding: 2px 6px; border-radius: 5px; }
  .prio-tag[data-p="urgent"] { color: var(--urgent); background: rgba(255,84,104,.12); }
  .prio-tag[data-p="high"]   { color: var(--high);   background: rgba(255,157,66,.12); }
  .prio-tag[data-p="normal"] { display: none; }
  .prio-tag[data-p="low"]    { color: var(--low);    background: rgba(95,106,140,.16); }
  .proj-badge { font-family: var(--mono); font-size: 9.5px; color: var(--text-faint); background: var(--panel); border: 1px solid var(--line-soft); padding: 2px 6px; border-radius: 5px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .card .title { font-size: 13.5px; line-height: 1.36; font-weight: 550; color: var(--text); overflow-wrap: anywhere; }
  .card .desc { font-size: 12px; line-height: 1.45; color: var(--text-dim); margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .thumbs { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .thumbs img { width: 46px; height: 46px; object-fit: cover; border-radius: 7px; border: 1px solid var(--line); background: var(--panel); }
  .thumbs .more { width: 46px; height: 46px; border-radius: 7px; border: 1px solid var(--line-soft); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--text-faint); }

  .card .foot { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .label { font-family: var(--mono); font-size: 10px; letter-spacing: .04em; color: var(--text-dim); background: var(--panel-2); border: 1px solid var(--line-soft); padding: 2px 7px; border-radius: 999px; }
  .label::before { content: "#"; color: var(--text-faint); }
  .time { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  /* An agent has claimed this ticket and is working it. */
  .claimchip { font-family: var(--mono); font-size: 10px; color: var(--mint); background: rgba(53,214,160,.10); border: 1px solid rgba(53,214,160,.32); padding: 2px 7px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .claimchip .pulse { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex: none; box-shadow: 0 0 0 0 rgba(53,214,160,.5); animation: claimpulse 2s ease-out infinite; }
  .claimchip.stale { color: var(--text-faint); background: var(--panel-2); border-color: var(--line-soft); }
  .claimchip.stale .pulse { animation: none; }
  @keyframes claimpulse { 0% { box-shadow: 0 0 0 0 rgba(53,214,160,.5); } 70%,100% { box-shadow: 0 0 0 5px rgba(53,214,160,0); } }

  /* ---------- Modal ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(6,9,18,.62); backdrop-filter: blur(6px); display: flex; align-items: flex-start; justify-content: center; padding: 6vh 20px; z-index: 40; opacity: 0; pointer-events: none; transition: opacity .16s; overflow-y: auto; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .modal { width: 100%; max-width: 580px; background: linear-gradient(180deg, var(--panel-2), var(--panel)); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); transform: translateY(8px) scale(.99); transition: transform .18s; }
  .overlay.show .modal { transform: none; }
  .modal-head { display: flex; align-items: center; gap: 10px; padding: 16px 18px; border-bottom: 1px solid var(--line-soft); }
  .modal-head .ref { font-size: 12px; }
  .modal-head .x { margin-left: auto; cursor: pointer; color: var(--text-faint); background: transparent; border: 0; padding: 4px; border-radius: 7px; display: flex; }
  .modal-head .x:hover { color: var(--text); background: var(--panel); }
  .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  .field label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px; }
  .field input[type="text"], .field textarea, .field select {
    width: 100%; background: var(--ink); border: 1px solid var(--line-soft); color: var(--text);
    border-radius: 9px; padding: 10px 12px; font-family: var(--sans); font-size: 14px; transition: border-color .14s;
  }
  .field textarea { resize: vertical; min-height: 78px; line-height: 1.5; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--gold-line); }
  .field .title-input { font-size: 16px; font-weight: 600; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg button { cursor: pointer; font-family: var(--mono); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; background: var(--ink); border: 1px solid var(--line-soft); color: var(--text-dim); padding: 8px 11px; border-radius: 8px; transition: all .12s; }
  .seg button .sw { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .seg button:hover { color: var(--text); border-color: var(--line); }
  .seg button.on { color: var(--text); border-color: var(--gold-line); background: var(--panel-2); }
  .seg.status button.on { background: var(--gold-soft); border-color: var(--gold-line); color: var(--gold-bright); }

  .dropzone { border: 1px dashed var(--line); border-radius: 9px; padding: 12px; text-align: center; font-size: 12px; color: var(--text-faint); transition: all .14s; }
  .dropzone.hot { border-color: var(--gold-line); background: var(--gold-soft); color: var(--gold-bright); }
  .att-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .att { position: relative; }
  .att img { width: 66px; height: 66px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
  .att .rm { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--urgent); color: #fff; border: 2px solid var(--panel); cursor: pointer; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }

  .modal-foot { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--line-soft); }
  .modal-foot .meta { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); }
  .modal-foot .spacer { flex: 1; }

  /* ---------- Lightbox ---------- */
  .lightbox { position: fixed; inset: 0; background: rgba(3,5,12,.9); display: none; align-items: center; justify-content: center; z-index: 60; padding: 4vh; cursor: zoom-out; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 10px; box-shadow: 0 24px 80px -20px rgba(0,0,0,.9); }

  /* ---------- Toast ---------- */
  .toasts { position: fixed; right: 18px; bottom: 18px; display: flex; flex-direction: column; gap: 8px; z-index: 80; }
  .toast { background: var(--panel-2); border: 1px solid var(--line); border-left: 3px solid var(--gold); color: var(--text); padding: 10px 14px; border-radius: 9px; font-size: 13px; box-shadow: var(--shadow); animation: toastin .2s ease both; }
  @keyframes toastin { from { opacity: 0; transform: translateY(8px); } }

  /* ---------- Global loading / empty board ---------- */
  .board-empty { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--text-faint); text-align: center; padding: 8vh 20px; }
  .board-empty .mark { color: var(--gold); width: 40px; height: 40px; opacity: .8; }
  .board-empty h2 { margin: 0; font-size: 17px; color: var(--text-dim); font-weight: 600; }
  .board-empty p { margin: 0; font-size: 13px; max-width: 420px; line-height: 1.6; }
  .board-empty code { font-family: var(--mono); font-size: 12px; color: var(--gold); background: var(--gold-soft); padding: 2px 6px; border-radius: 5px; }

  /* ---------- Responsive ---------- */
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .rail { border-right: 0; border-bottom: 1px solid var(--line-soft); }
    .brand { padding: 12px 16px; }
    .rail-head { display: none; }
    .projects { display: flex; overflow-x: auto; overflow-y: hidden; padding: 4px 10px 10px; gap: 8px; }
    .proj { width: auto; min-width: 190px; margin-bottom: 0; flex: 0 0 auto; }
    .proj .path { display: none; }
    .rail-foot { display: none; }
    .board { grid-auto-flow: row; grid-auto-columns: unset; grid-template-columns: 1fr; }
    .col { max-height: none; }
    .topbar { flex-wrap: wrap; gap: 10px; }
    .search input { width: 100%; max-width: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ===================== Left rail ===================== -->
  <aside class="rail">
    <div class="brand">
      <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <g stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
          <line x1="12" y1="2.5" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="21.5" y2="12"/>
          <line x1="5.4" y1="5.4" x2="18.6" y2="18.6"/><line x1="18.6" y1="5.4" x2="5.4" y2="18.6"/>
        </g>
        <circle cx="12" cy="12" r="2.4" fill="currentColor"/>
      </svg>
      <div>
        <div class="word">side<b>quest</b></div>

    </div>
    <div class="rail-head">Boards</div>
    <nav class="projects" id="projects" aria-label="Projects"></nav>
    <div class="rail-foot">

    </div>

  <!-- ===================== Main ===================== -->
  <main class="main">
    <header class="topbar">
      <div class="title-wrap">
        <h1 id="boardTitle">All boards</h1>
        <div class="sub" id="boardSub">every project</div>
      </div>
      <div class="spacer"></div>
      <div class="search">
        <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input id="search" type="text" placeholder="Search tickets" aria-label="Search tickets" />
      </div>
      <div class="filters" id="filters"></div>
      <button class="iconbtn off" id="notifyBtn" title="Desktop notifications" aria-label="Toggle desktop notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </button>
      <div class="popwrap">
        <button class="iconbtn" id="settingsBtn" title="Notification settings" aria-label="Notification settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="popover" id="settingsPop" role="menu" aria-label="Notification settings">
          <div class="pop-head">Notify me about</div>
          <label class="pop-row"><input type="checkbox" data-notif="question" /><span><b>Questions</b> from Claude<em>a comment that needs your reply</em></span></label>
          <label class="pop-row"><input type="checkbox" data-notif="comment" /><span>Comments<em>notes Claude leaves on a ticket</em></span></label>
          <label class="pop-row"><input type="checkbox" data-notif="created" /><span>New tickets<em>filed by Claude in the background</em></span></label>
          <label class="pop-row"><input type="checkbox" data-notif="status" /><span>Status changes<em>Claude moved a ticket between columns</em></span></label>
          <div class="pop-foot">Applies to desktop toasts and the sidebar badges. Your own dashboard edits never notify.</div>
        </div>
      </div>
      <button class="btn btn-primary" id="newBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New ticket
      </button>
    </header>
    <div class="board-scroll">
      <div class="board" id="board"></div>
    </div>
  </main>
</div>

<!-- ===================== Modal ===================== -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="ref" id="modalRef">New quest</span>
      <span id="modalTitle" style="font-size:13px;color:var(--text-dim)">Ticket</span>
      <button class="x" id="modalClose" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field" id="projField" style="display:none">
        <label for="mProject">Board</label>
        <select id="mProject"></select>
      </div>
      <div class="field">
        <label for="mTitle">Title</label>

      </div>
      <div class="field">
        <label for="mDesc">Details</label>
        <textarea id="mDesc" placeholder="What's happening, and how to reproduce it."></textarea>
      </div>
      <div class="row">
        <div class="field">
          <label>Priority</label>
          <div class="seg prio" id="mPriority"></div>
        </div>
        <div class="field">
          <label>Column</label>
          <div class="seg status" id="mStatus"></div>
        </div>
      </div>
      <div class="field">
        <label for="mLabels">Labels</label>
        <input id="mLabels" type="text" placeholder="bug, frontend  (comma-separated)" />
      </div>
      <div class="field">
        <label>Images</label>
        <div class="dropzone" id="dropzone">Paste (Ctrl/Cmd&nbsp;V) or drop an image here</div>
        <div class="att-grid" id="attGrid"></div>
      </div>
      <div class="field" id="linksField" style="display:none">
        <label>Links &amp; dependencies</label>
        <div class="linklist" id="linkList"></div>
        <div class="addlink" style="display:flex;gap:8px;margin-top:8px">
          <select id="linkVerb"><option value="blocks">blocks</option><option value="depends-on">depends on</option><option value="related">related to</option></select>
          <select id="linkTarget"></select>
          <button class="btn btn-ghost" id="addLinkBtn" type="button">Link</button>

      <div class="field" id="commentsField" style="display:none">

        <div class="addcmt">
          <textarea id="cmtBody" placeholder="Reply, or leave a note…"></textarea>
          <div style="display:flex;flex-direction:column;gap:6px">

    <div class="modal-foot">
      <button class="btn btn-danger" id="mDelete" style="display:none">Delete</button>
      <span class="meta" id="mMeta"></span>
      <span class="spacer"></span>
      <button class="btn btn-ghost" id="mCancel">Cancel</button>
      <button class="btn btn-primary" id="mSave">Save</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt="attachment" /></div>
<div class="toasts" id="toasts"></div>

<script>
(function () {
  "use strict";

  // ---------------- constants ----------------
  var PRIORITIES = [
    { k: "urgent", c: "var(--urgent)" },
    { k: "high",   c: "var(--high)"   },
    { k: "normal", c: "var(--normal)" },
    { k: "low",    c: "var(--low)"    }
  ];
  var STATUSES = [
    { k: "todo",  label: "To do" },
    { k: "doing", label: "Doing" },
    { k: "done",  label: "Done"  }
  ];
  var POLL_MS = 2500;

  // ---------------- state ----------------
  var state = {
    projects: [],
    current: "all",           // "all" or a project slug
    allTickets: [],           // every project's tickets (each carries .project/.projectName)
    tickets: [],              // the current view, derived from allTickets
    filterPriority: "all",
    query: "",
    seen: null,               // Set of ticket ids we've already rendered (for pickup anim)
    dragging: false,
    mutating: 0,              // count of in-flight mutations; pause poll-render while >0
    editor: null,             // { mode:'new'|'edit', ticket, attachments:[{name,base64,url}] }
    notified: null,           // Set of "id|updatedAt" already handled for notifications (null = first load)
    lastSeen: {}              // slug -> ms epoch you last viewed that board (persisted)
  };
  var lastSig = "";

  // Per-project "last seen" drives the sidebar unread badges; persist it so the
  // badges survive a reload and stay consistent across tabs.
  try { state.lastSeen = JSON.parse(localStorage.getItem("sq_lastseen") || "{}") || {}; } catch (_) { state.lastSeen = {}; }
  function saveLastSeen() { try { localStorage.setItem("sq_lastseen", JSON.stringify(state.lastSeen)); } catch (_) {} }
  function markSeen(slug) {
    var now = Date.now();
    if (slug === "all") { state.projects.forEach(function (p) { state.lastSeen[p.slug] = now; }); }
    else if (slug) { state.lastSeen[slug] = now; }
    saveLastSeen();
  }

  // Which background event kinds produce a notification + badge (persisted).
  var NOTIFY_DEFAULTS = { question: true, comment: true, created: true, status: true };
  var notifyPrefs = NOTIFY_DEFAULTS;
  try { notifyPrefs = Object.assign({}, NOTIFY_DEFAULTS, JSON.parse(localStorage.getItem("sq_notify") || "{}")); } catch (_) {}
  function saveNotifyPrefs() { try { localStorage.setItem("sq_notify", JSON.stringify(notifyPrefs)); } catch (_) {} }

  // ---------------- helpers ----------------
  var $ = function (id) { return document.getElementById(id); };
  function el(tag, cls, html) { var e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }

  function api(path, opts) {
    return fetch(path, opts).then(function (r) {
      if (!r.ok) return r.json().catch(function () { return {}; }).then(function (j) { throw new Error(j.error || ("HTTP " + r.status)); });
      return r.json();
    });
  }
  function slugOf(t) { return t._slug || t.project || (state.current !== "all" ? state.current : null); }
  function assetUrl(t, file) { return "/api/asset/" + encodeURIComponent(slugOf(t)) + "/" + encodeURIComponent(t.id) + "/" + encodeURIComponent(file); }

  // A change worth flagging: a ticket that Claude/the CLI (not the dashboard)
  // created or moved between columns. Edits and your own dashboard actions don't count.
  // A change made by Claude/CLI (not the dashboard) of a kind you've opted into.
  function isBackgroundChange(t) {
    if (!t.lastEventSource || t.lastEventSource === "dashboard") return false;
    var k = t.lastEventType;
    if (k === "created") return !!notifyPrefs.created;
    if (k === "status") return !!notifyPrefs.status;
    if (k === "comment") return !!notifyPrefs.comment;
    if (k === "question") return !!notifyPrefs.question;
    return false;
  }
  function ticketByRef(ref) {
    var u = String(ref).toUpperCase();
    for (var i = 0; i < state.allTickets.length; i++) {
      if (String(state.allTickets[i].ref).toUpperCase() === u) return state.allTickets[i];
    }
    return null;
  }
  // Mirrors store.needsResponse: true while the most recent agent-asked question
  // hasn't yet been followed by a reply from the dashboard (the human). A self-note
  // the agent leaves in between doesn't count as an answer — keep walking past it.
  function needsResponseClient(t) {
    var comments = (t && t.comments) || [];
    for (var i = comments.length - 1; i >= 0; i--) {
      if (comments[i].source === "dashboard") return false;
      if (comments[i].kind === "question") return true;
    }
    return false;
  }
  // Refs blocking this ticket that aren't done yet (computed from the loaded set).
  function openBlockersClient(t) {
    if (!t || !t.links) return [];
    var out = [];
    for (var i = 0; i < t.links.length; i++) {
      if (t.links[i].type !== "blocked-by") continue;
      var b = ticketByRef(t.links[i].ref);
      if (b && b.status !== "done") out.push(b.ref);
    }
    return out;
  }
  // A claim past the default TTL is likely abandoned; shown muted. (Display only —
  // the CLI enforces the real, possibly env-configured, timeout.)
  function claimStale(claim) {
    if (!claim || !claim.at) return true;
    var t = Date.parse(claim.at);
    return !isFinite(t) || Date.now() - t > 60 * 60 * 1000;
  }
  function unseenCount(slug) {
    var since = state.lastSeen[slug] || 0;
    var n = 0;
    for (var i = 0; i < state.allTickets.length; i++) {
      var t = state.allTickets[i];
      if (t.project === slug && isBackgroundChange(t) && Date.parse(t.updatedAt) > since) n++;
    }
    return n;
  }

  function relTime(iso) {
    if (!iso) return "";
    var d = new Date(iso), now = new Date(), s = (now - d) / 1000;
    if (s < 45) return "just now";
    if (s < 90) return "1m";
    if (s < 3600) return Math.round(s / 60) + "m";
    if (s < 5400) return "1h";
    if (s < 86400) return Math.round(s / 3600) + "h";
    if (s < 172800) return "yesterday";
    if (s < 604800) return Math.round(s / 86400) + "d";
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }
  function fullTime(iso) { if (!iso) return ""; return new Date(iso).toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }); }

  function toast(msg) {
    var t = el("div", "toast", esc(msg));
    $("toasts").appendChild(t);
    setTimeout(function () { t.style.transition = "opacity .3s"; t.style.opacity = "0"; setTimeout(function () { t.remove(); }, 300); }, 2600);
  }

  // ---------------- data loading ----------------
  function loadProjects() {
    return api("/api/projects").then(function (d) { state.projects = d.projects || []; });
  }
  // Always load every project's tickets (one source of truth). The board view is
  // derived by filtering, and the sidebar badges + notifications need to know
  // about changes in projects you aren't currently looking at.
  function loadTickets() {
    return api("/api/tickets?project=all").then(function (d) {
      state.allTickets = (d.tickets || []).map(function (t) { t._slug = t.project; return t; });
      deriveVisible();
    });
  }
  function deriveVisible() {
    state.tickets = state.current === "all"
      ? state.allTickets
      : state.allTickets.filter(function (t) { return t.project === state.current; });
  }

  function signature() {
    // A compact fingerprint of what's on screen, so polling only re-renders on real change.
    var parts = state.projects.map(function (p) { return p.slug + ":" + p.counts.todo + "," + p.counts.doing + "," + p.counts.done; });
    var ts = state.tickets.map(function (t) { return t.id + t.status + t.priority + t.updatedAt + t.title.length + t.assets.length + t.labels.join(","); });
    return state.current + "|" + parts.join(";") + "||" + ts.sort().join(";");
  }

  // ---------------- rendering ----------------
  function renderRail() {
    var nav = $("projects");
    nav.innerHTML = "";

    var totals = state.projects.reduce(function (a, p) { a.todo += p.counts.todo; a.doing += p.counts.doing; a.done += p.counts.done; a.open += p.open; return a; }, { todo: 0, doing: 0, done: 0, open: 0 });
    nav.appendChild(projButton({ slug: "all", name: "All boards", path: state.projects.length + " project" + (state.projects.length === 1 ? "" : "s"), counts: totals, open: totals.open }, true));

    state.projects.forEach(function (p) { nav.appendChild(projButton(p, false)); });
  }

  function projButton(p, isAll) {
    var active = state.current === p.slug;
    var b = el("button", "proj" + (active ? " active" : ""));
    b.setAttribute("type", "button");
    var total = p.counts.todo + p.counts.doing + p.counts.done;
    var seg = "";
    if (total > 0) {
      seg = '<div class="bar">' +
        '<i class="t" style="width:' + (p.counts.todo / total * 100) + '%"></i>' +
        '<i class="d" style="width:' + (p.counts.doing / total * 100) + '%"></i>' +
        '<i class="n" style="width:' + (p.counts.done / total * 100) + '%"></i></div>';
    }
    var unseen = isAll ? 0 : unseenCount(p.slug);
    var badge = unseen > 0
      ? '<span class="newbadge" title="' + unseen + ' changed by Claude since you last looked">' + (unseen > 99 ? "99+" : unseen) + '</span>'
      : "";
    b.innerHTML =
      '<div class="row1"><span class="name">' + esc(p.name) + '</span>' + badge +
      '<span class="count">' + (p.open || 0) + '</span></div>' +
      '<div class="path">' + esc(p.path || "") + '</div>' + seg;
    b.addEventListener("click", function () { selectProject(p.slug); });
    return b;
  }

  function renderFilters() {
    var f = $("filters");
    if (f.childNodes.length) return; // static
    var all = el("button", "chip" + (state.filterPriority === "all" ? " active" : ""), "All");
    all.dataset.p = "all";
    f.appendChild(all);
    PRIORITIES.forEach(function (p) {
      var c = el("button", "chip", '<span class="swatch" style="background:' + p.c + '"></span>' + p.k);
      c.dataset.p = p.k;
      f.appendChild(c);
    });
    f.addEventListener("click", function (e) {
      var chip = e.target.closest(".chip"); if (!chip) return;
      state.filterPriority = chip.dataset.p;
      Array.prototype.forEach.call(f.children, function (ch) { ch.classList.toggle("active", ch.dataset.p === state.filterPriority); });
      renderBoard();
    });
  }

  function visibleTickets() {
    var q = state.query.trim().toLowerCase();
    return state.tickets.filter(function (t) {
      if (state.filterPriority !== "all" && t.priority !== state.filterPriority) return false;
      if (q) {
        var hay = (t.ref + " " + t.title + " " + t.description + " " + t.labels.join(" ")).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }

  function renderHeader() {
    if (state.current === "all") {
      $("boardTitle").textContent = "All boards";
      $("boardSub").textContent = state.projects.length + " project" + (state.projects.length === 1 ? "" : "s") + " · " + state.tickets.length + " ticket" + (state.tickets.length === 1 ? "" : "s");
    } else {
      var p = state.projects.filter(function (x) { return x.slug === state.current; })[0];
      $("boardTitle").textContent = p ? p.name : state.current;
      $("boardSub").textContent = p ? p.path : "";
    }
  }

  function renderBoard() {
    renderHeader();
    var board = $("board");
    var tickets = visibleTickets();

    if (!state.tickets.length) {
      board.innerHTML = "";
      var eb = el("div", "board-empty");
      eb.innerHTML =
        '<svg class="mark" viewBox="0 0 24 24" fill="none"><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4"/><line x1="18.4" y1="5.6" x2="5.6" y2="18.4"/></g></svg>' +
        '<h2>No side quests yet</h2>' +
        '<p>Mention a stray issue while Claude is mid-task — <em>"oh, and the contact form doesn\'t send"</em> — and it lands here as a ticket. Or hit <b style="color:var(--text-dim)">New ticket</b>.</p>';
      board.appendChild(eb);
      return;
    }

    var newSeen = new Set();
    board.innerHTML = "";
    STATUSES.forEach(function (col) {
      var items = tickets.filter(function (t) { return t.status === col.k; }).sort(function (a, b) { return (b.order || 0) - (a.order || 0); });
      var colEl = el("div", "col");
      colEl.dataset.status = col.k;
      colEl.innerHTML = '<div class="col-head"><span class="flag"></span><span class="h">' + col.label + '</span><span class="n">' + items.length + '</span></div>';
      var body = el("div", "col-body");
      if (!items.length) {
        body.appendChild(el("div", "empty", col.k === "todo" ? "Quiet for now.<br><b>New quests appear here.</b>" : (col.k === "doing" ? "Nothing in progress." : "Nothing shipped yet.")));
      }
      items.forEach(function (t) {
        newSeen.add(t.id);
        body.appendChild(renderCard(t));
      });
      setupColumnDrop(colEl, col.k);
      colEl.appendChild(body);
      board.appendChild(colEl);
    });

    // Animate cards that are genuinely new since the last render (the "pickup").
    if (state.seen) {
      board.querySelectorAll(".card").forEach(function (c) {
        if (!state.seen.has(c.dataset.id)) c.classList.add("just-arrived");
      });
    }
    state.seen = newSeen;
  }

  function renderCard(t) {
    var c = el("div", "card");
    c.dataset.id = t.id;
    c.dataset.priority = t.priority;
    c.setAttribute("draggable", "true");
    c.setAttribute("tabindex", "0");
    c.setAttribute("role", "button");

    var badge = state.current === "all" ? '<span class="proj-badge">' + esc(t.projectName || "") + '</span>' : "";
    var thumbs = "";
    if (t.assets && t.assets.length) {
      var shown = t.assets.slice(0, 3).map(function (f) { return '<img loading="lazy" src="' + assetUrl(t, f) + '" alt="" />'; }).join("");
      var more = t.assets.length > 3 ? '<div class="more">+' + (t.assets.length - 3) + '</div>' : "";
      thumbs = '<div class="thumbs">' + shown + more + '</div>';
    }
    var labels = (t.labels || []).slice(0, 4).map(function (l) { return '<span class="label">' + esc(l) + '</span>'; }).join("");
    var desc = t.description ? '<div class="desc">' + esc(t.description) + '</div>' : "";
    var claim = "";
    if (t.claim && t.claim.by) {
      var stale = claimStale(t.claim);
      claim = '<span class="claimchip' + (stale ? " stale" : "") + '" title="' + (stale ? "stale claim by " : "being worked by ") +
        esc(t.claim.by) + '"><span class="pulse"></span>' + esc(t.claim.by) + (stale ? " (stale)" : "") + '</span>';
    }

    var blockers = openBlockersClient(t);
    var blockedChip = blockers.length ? '<span class="blockchip" title="blocked by ' + esc(blockers.join(", ")) + '">⛔ blocked</span>' : "";
    var qChip = needsResponseClient(t)
      ? '<span class="blockchip" style="color:var(--gold-bright);background:var(--gold-soft);border-color:var(--gold-line)" title="Claude asked a question — open the ticket to reply">❓ needs reply</span>'
      : "";
    var cmtCount = t.comments && t.comments.length
      ? '<span style="font-family:var(--mono);font-size:10px;color:var(--text-faint)" title="' + t.comments.length + ' comment(s)">\u{1F4AC} ' + t.comments.length + '</span>'
      : "";

    c.innerHTML =
      '<div class="top"><span class="ref">' + esc(t.ref) + '</span>' + badge +
      '<span class="prio-tag" data-p="' + t.priority + '">' + t.priority + '</span></div>' +
      '<div class="title">' + esc(t.title) + '</div>' + desc + thumbs +
      '<div class="foot">' + qChip + blockedChip + claim + labels + cmtCount + '<span class="time">' + relTime(t.updatedAt) + '</span></div>';

    c.addEventListener("click", function (e) { if (e.target.tagName === "IMG") { openLightbox(e.target.src); return; } openEditor(t); });
    c.addEventListener("keydown", function (e) { if (e.key === "Enter") openEditor(t); });
    setupCardDrag(c, t);
    return c;
  }

  // ---------------- drag & drop ----------------
  var dragId = null, dragSlug = null;
  function setupCardDrag(card, t) {
    card.addEventListener("dragstart", function (e) {
      dragId = t.id; dragSlug = slugOf(t); state.dragging = true;
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      try { e.dataTransfer.setData("text/plain", t.id); } catch (_) {}
    });
    card.addEventListener("dragend", function () { card.classList.remove("dragging"); state.dragging = false; clearDropTargets(); });
  }
  function clearDropTargets() { document.querySelectorAll(".col.drop-target").forEach(function (c) { c.classList.remove("drop-target"); }); }
  function setupColumnDrop(colEl, status) {
    colEl.addEventListener("dragover", function (e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; colEl.classList.add("drop-target"); });
    colEl.addEventListener("dragleave", function (e) { if (!colEl.contains(e.relatedTarget)) colEl.classList.remove("drop-target"); });
    colEl.addEventListener("drop", function (e) {
      e.preventDefault(); colEl.classList.remove("drop-target");
      if (!dragId) return;
      moveTicket(dragId, dragSlug, status);
      dragId = null; dragSlug = null;
    });
  }
  function moveTicket(id, slug, status) {
    var t = state.tickets.filter(function (x) { return x.id === id; })[0];
    if (!t || t.status === status) return;
    t.status = status; t.order = Date.now(); t.updatedAt = new Date().toISOString(); // optimistic
    renderBoard();
    mutate("PATCH", "/api/tickets/" + id + "?project=" + encodeURIComponent(slug), { status: status, order: t.order })
      .then(function () { toast(t.ref + " → " + status); })
      .catch(function (err) { toast("Move failed: " + err.message); refresh(true); });
  }

  function mutate(method, path, body) {
    state.mutating++;
    return api(path, { method: method, headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) })
      .then(function (r) { return r; })
      .finally(function () { state.mutating--; });
  }

  // ---------------- editor modal ----------------
  function buildSegments() {
    var pc = $("mPriority"); pc.innerHTML = "";
    PRIORITIES.forEach(function (p) {
      var b = el("button", "", '<span class="sw" style="background:' + p.c + '"></span>' + p.k);
      b.type = "button"; b.dataset.k = p.k;
      b.addEventListener("click", function () { setSeg(pc, p.k); });
      pc.appendChild(b);
    });
    var sc = $("mStatus"); sc.innerHTML = "";
    STATUSES.forEach(function (s) {
      var b = el("button", "", s.label);
      b.type = "button"; b.dataset.k = s.k;
      b.addEventListener("click", function () { setSeg(sc, s.k); });
      sc.appendChild(b);
    });
  }
  function setSeg(container, k) { Array.prototype.forEach.call(container.children, function (b) { b.classList.toggle("on", b.dataset.k === k); }); }
  function segValue(container) { var on = container.querySelector(".on"); return on ? on.dataset.k : null; }

  function openEditor(ticket) {
    state.editor = { mode: ticket ? "edit" : "new", ticket: ticket || null, attachments: [] };
    var isEdit = !!ticket;

    $("modalRef").textContent = isEdit ? ticket.ref : "New quest";
    $("modalTitle").textContent = isEdit ? "Edit ticket" : "Capture a side quest";
    $("mTitle").value = isEdit ? ticket.title : "";
    $("mDesc").value = isEdit ? ticket.description : "";
    $("mLabels").value = isEdit ? (ticket.labels || []).join(", ") : "";
    setSeg($("mPriority"), isEdit ? ticket.priority : "normal");
    setSeg($("mStatus"), isEdit ? ticket.status : "todo");
    $("mDelete").style.display = isEdit ? "" : "none";
    $("mMeta").textContent = isEdit ? ("created " + fullTime(ticket.createdAt) + " · updated " + fullTime(ticket.updatedAt)) : "";

    // Board selector: shown only when creating from the "All boards" view.
    var pf = $("projField"), sel = $("mProject");
    if (!isEdit && state.current === "all") {
      pf.style.display = "";
      sel.innerHTML = state.projects.map(function (p) { return '<option value="' + esc(p.slug) + '">' + esc(p.name) + "</option>"; }).join("");
      if (!state.projects.length) sel.innerHTML = '<option value="">No boards yet — create a ticket from a project first</option>';
    } else {
      pf.style.display = "none";
    }

    // Links + comments only make sense for an existing ticket.
    $("linksField").style.display = isEdit ? "" : "none";
    $("commentsField").style.display = isEdit ? "" : "none";
    if (isEdit) { renderLinks(ticket); renderThread(ticket); populateLinkTargets(ticket); $("cmtBody").value = ""; }

    renderAttachments();
    $("overlay").classList.add("show");
    setTimeout(function () { $("mTitle").focus(); }, 40);
  }

  function editorSlug() { return state.editor && state.editor.ticket ? slugOf(state.editor.ticket) : state.current; }

  function renderLinks(ticket) {
    var box = $("linkList");
    var links = ticket.links || [];
    if (!links.length) { box.innerHTML = '<span class="none">No links yet.</span>'; return; }
    var verb = { "blocked-by": "blocked by", blocks: "blocks", related: "related to" };
    box.innerHTML = "";
    links.forEach(function (l) {
      var target = ticketByRef(l.ref);
      var doneMark = target && target.status === "done" ? " ✓" : "";
      var pill = el("span", "linkpill " + l.type);
      pill.innerHTML = '<span class="lt">' + (verb[l.type] || l.type) + '</span> ' + esc(l.ref) + doneMark + ' <span class="x" title="Remove link">✕</span>';
      pill.querySelector(".x").addEventListener("click", function () { removeLink(ticket, l.ref); });
      box.appendChild(pill);
    });
  }

  function populateLinkTargets(ticket) {
    var sel = $("linkTarget");
    var here = state.allTickets.filter(function (t) { return t.project === slugOf(ticket) && t.id !== ticket.id; });
    sel.innerHTML = here.length
      ? here.map(function (t) { return '<option value="' + esc(t.ref) + '">' + esc(t.ref + " · " + t.title.slice(0, 40)) + "</option>"; }).join("")
      : '<option value="">No other tickets to link</option>';
  }

  function renderThread(ticket) {
    var box = $("thread");
    var comments = ticket.comments || [];
    if (!comments.length) { box.innerHTML = '<div class="cmt-empty">No comments yet. Leave a note, or Claude will ask here when it needs input.</div>'; return; }
    box.innerHTML = "";
    comments.forEach(function (c) {
      var d = el("div", "cmt" + (c.kind === "question" ? " question" : ""));
      var tag = c.kind === "question" ? "❓ question" : "💬";
      d.innerHTML = '<div class="cmt-head"><span class="tag">' + tag + '</span> <span class="who">' + esc(c.by) + '</span> · ' + relTime(c.at) + '</div>' +
        '<div class="cmt-body">' + esc(c.body) + '</div>';
      box.appendChild(d);
    });
    box.scrollTop = box.scrollHeight;
  }

  function postComment(kind) {
    var ed = state.editor; if (!ed || !ed.ticket) return;
    var body = $("cmtBody").value.trim();
    if (!body) { $("cmtBody").focus(); return; }
    var slug = editorSlug();
    mutate("POST", "/api/tickets/" + ed.ticket.id + "/comment?project=" + encodeURIComponent(slug), { body: body, kind: kind, by: "you" })
      .then(function (r) {
        if (r && r.ticket) { ed.ticket = r.ticket; renderThread(r.ticket); }
        $("cmtBody").value = "";
        toast(kind === "question" ? "Question posted" : "Comment added");
        refresh(true);
      })
      .catch(function (e) { toast("Comment failed: " + e.message); });
  }

  function addLink() {
    var ed = state.editor; if (!ed || !ed.ticket) return;
    var verb = $("linkVerb").value, to = $("linkTarget").value;
    if (!to) return;
    var slug = editorSlug();
    mutate("POST", "/api/tickets/" + ed.ticket.id + "/link?project=" + encodeURIComponent(slug), { verb: verb, to: to })
      .then(function (r) {
        if (r && r.from) { ed.ticket = r.from; renderLinks(r.from); }
        toast("Linked " + ed.ticket.ref + " " + (r.type || verb) + " " + to);
        refresh(true);
      })
      .catch(function (e) { toast("Link failed: " + e.message); });
  }

  function removeLink(ticket, otherRef) {
    var slug = slugOf(ticket);
    mutate("DELETE", "/api/tickets/" + ticket.id + "/link/" + encodeURIComponent(otherRef) + "?project=" + encodeURIComponent(slug))
      .then(function () {
        ticket.links = (ticket.links || []).filter(function (l) { return String(l.ref).toUpperCase() !== String(otherRef).toUpperCase(); });
        renderLinks(ticket);
        toast("Link removed");
        refresh(true);
      })
      .catch(function (e) { toast("Unlink failed: " + e.message); });
  }

  function renderAttachments() {
    var grid = $("attGrid"); grid.innerHTML = "";
    var ed = state.editor; if (!ed) return;
    // Existing attachments (edit mode)
    if (ed.ticket && ed.ticket.assets) {
      ed.ticket.assets.forEach(function (f) {
        if (ed.removed && ed.removed.indexOf(f) !== -1) return;
        var a = el("div", "att");
        a.innerHTML = '<img src="' + assetUrl(ed.ticket, f) + '" alt="" /><button class="rm" title="Remove" type="button">×</button>';
        a.querySelector("img").addEventListener("click", function () { openLightbox(a.querySelector("img").src); });
        a.querySelector(".rm").addEventListener("click", function () { ed.removed = ed.removed || []; ed.removed.push(f); renderAttachments(); });
        grid.appendChild(a);
      });
    }
    // Newly added (pending upload)
    ed.attachments.forEach(function (att, i) {
      var a = el("div", "att");
      a.innerHTML = '<img src="' + att.url + '" alt="" /><button class="rm" title="Remove" type="button">×</button>';
      a.querySelector("img").addEventListener("click", function () { openLightbox(att.url); });
      a.querySelector(".rm").addEventListener("click", function () { ed.attachments.splice(i, 1); renderAttachments(); });
      grid.appendChild(a);
    });
  }

  function addImageFile(file) {
    if (!file || file.type.indexOf("image/") !== 0) return;
    var reader = new FileReader();
    reader.onload = function () {
      var url = reader.result;
      state.editor.attachments.push({ name: file.name || "pasted.png", base64: url, url: url });
      renderAttachments();
    };
    reader.readAsDataURL(file);
  }

  function closeModal() { $("overlay").classList.remove("show"); state.editor = null; }

  function saveEditor() {
    var ed = state.editor; if (!ed) return;
    var title = $("mTitle").value.trim();
    if (!title) { $("mTitle").focus(); toast("A title is required"); return; }
    var payload = {
      title: title,
      description: $("mDesc").value.trim(),
      priority: segValue($("mPriority")),
      status: segValue($("mStatus")),
      labels: $("mLabels").value.split(",").map(function (s) { return s.trim(); }).filter(Boolean),
      imagesData: ed.attachments.map(function (a) { return { name: a.name, base64: a.base64 }; })
    };

    if (ed.mode === "new") {
      var slug = state.current === "all" ? $("mProject").value : state.current;
      if (!slug) { toast("Pick a board first"); return; }
      payload.project = slug;
      mutate("POST", "/api/tickets", payload).then(function (r) {
        closeModal(); toast((r.ticket ? r.ticket.ref : "Ticket") + " created"); refresh(true);
      }).catch(function (e) { toast("Create failed: " + e.message); });
    } else {
      if (ed.removed && ed.removed.length) payload.removeAssets = ed.removed;
      var s = slugOf(ed.ticket);
      mutate("PATCH", "/api/tickets/" + ed.ticket.id + "?project=" + encodeURIComponent(s), payload).then(function () {
        closeModal(); toast(ed.ticket.ref + " saved"); refresh(true);
      }).catch(function (e) { toast("Save failed: " + e.message); });
    }
  }

  function deleteTicket() {
    var ed = state.editor; if (!ed || !ed.ticket) return;
    var t = ed.ticket, s = slugOf(t);
    mutate("DELETE", "/api/tickets/" + t.id + "?project=" + encodeURIComponent(s)).then(function () {
      closeModal(); toast(t.ref + " deleted"); refresh(true);
    }).catch(function (e) { toast("Delete failed: " + e.message); });
  }

  // ---------------- lightbox ----------------
  function openLightbox(src) { $("lightboxImg").src = src; $("lightbox").classList.add("show"); }

  // ---------------- navigation ----------------
  function selectProject(slug) {
    if (state.current === slug) return;
    state.current = slug;
    state.seen = null;
    lastSig = "";
    markSeen(slug);            // opening a board clears its unread badge
    deriveVisible();
    renderRail();
    loadTickets().then(function () { renderBoard(); lastSig = signature(); });
  }

  // ---------------- polling ----------------
  function refresh(force) {
    return Promise.all([loadProjects(), loadTickets()]).then(function () {
      processEvents();         // fire desktop notifications for background changes
      renderRail();            // reflect unread badges (may change even when the board doesn't)
      var sig = signature();
      if (force || (sig !== lastSig && !state.dragging && state.mutating === 0)) {
        renderBoard();
        lastSig = sig;
      }
    }).catch(function (e) {
      $("live").classList.remove("on"); $("liveText").textContent = "offline";
    }).then(function () {
      if (!$("live").classList.contains("on") && !navigatorOffline()) { $("live").classList.add("on"); $("liveText").textContent = "live"; }
    });
  }
  function navigatorOffline() { return false; }

  // Detect tickets Claude created/moved since the last poll and notify. On first
  // load we just remember what's there (no notifications for pre-existing tickets).
  function processEvents() {
    var keyOf = function (t) { return t.id + "|" + t.updatedAt; };
    if (state.notified === null) {
      state.notified = new Set(state.allTickets.map(keyOf));
    } else {
      for (var i = 0; i < state.allTickets.length; i++) {
        var t = state.allTickets[i], k = keyOf(t);
        if (state.notified.has(k)) continue;
        state.notified.add(k);
        if (isBackgroundChange(t)) maybeNotify(t);
      }
      if (state.notified.size > 4000) state.notified = new Set(state.allTickets.map(keyOf));
    }
    markSeen(state.current);   // the board you're on stays "seen" (no self-badge)
  }

  function maybeNotify(t) {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    // Only ping when you're not actively looking at the dashboard; when you are,
    // the sidebar badge and the live board already show it.
    if (document.hasFocus && document.hasFocus()) return;
    var lastC = t.comments && t.comments.length ? t.comments[t.comments.length - 1] : null;
    var title, body;
    if (t.lastEventType === "question") { title = "❓ Question · " + t.ref; body = lastC ? lastC.body : t.title; }
    else if (t.lastEventType === "comment") { title = "💬 Comment · " + t.ref; body = (lastC ? lastC.body + "  —  " : "") + t.title; }
    else if (t.lastEventType === "created") { title = "New side quest · " + t.ref; body = t.title; }
    else { title = t.ref + " → " + t.status; body = t.title; }
    if (state.projects.length > 1 && t.projectName) body += "  ·  " + t.projectName;
    try {
      // The tag collapses duplicates when several dashboard tabs are open.
      var n = new Notification(title, { body: body, tag: "sq:" + t.id + ":" + t.updatedAt, icon: iconDataUrl || undefined, silent: false });
      n.onclick = function () { try { window.focus(); } catch (_) {} if (t.project) selectProject(t.project); n.close(); };
    } catch (_) {}
  }

  // ---------------- notifications: permission + brand icon ----------------
  var iconDataUrl = null;
  function makeIcon() {
    try {
      var c = document.createElement("canvas"); c.width = 64; c.height = 64;
      var x = c.getContext("2d");
      x.fillStyle = "#0b0f1e"; x.fillRect(0, 0, 64, 64);
      x.strokeStyle = "#f5b13d"; x.lineWidth = 5; x.lineCap = "round";
      var cx = 32, cy = 32, r = 21, angs = [0, 45, 90, 135];
      for (var i = 0; i < angs.length; i++) {
        var a = angs[i] * Math.PI / 180;
        x.beginPath(); x.moveTo(cx - Math.cos(a) * r, cy - Math.sin(a) * r); x.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r); x.stroke();
      }
      x.fillStyle = "#f5b13d"; x.beginPath(); x.arc(cx, cy, 6, 0, Math.PI * 2); x.fill();
      iconDataUrl = c.toDataURL("image/png");
      var link = document.querySelector("link[rel~='icon']") || document.createElement("link");
      link.rel = "icon"; link.href = iconDataUrl; document.head.appendChild(link);
    } catch (_) {}
  }
  function updateBell() {
    var b = $("notifyBtn"); if (!b) return;
    b.classList.remove("on", "off");
    if (!("Notification" in window)) { b.classList.add("off"); b.title = "Desktop notifications aren't supported here"; return; }
    var p = Notification.permission;
    if (p === "granted") { b.classList.add("on"); b.title = "Desktop notifications: on"; }
    else if (p === "denied") { b.classList.add("off"); b.title = "Notifications are blocked — allow them for this site in your browser"; }
    else { b.classList.add("off"); b.title = "Turn on desktop notifications for Claude's background changes"; }
  }
  function requestNotify() {
    if (!("Notification" in window)) { toast("This browser has no desktop notifications"); return; }
    if (Notification.permission === "granted") { toast("Desktop notifications are already on"); updateBell(); return; }
    if (Notification.permission === "denied") { toast("Notifications are blocked — allow them for this site in your browser settings"); return; }
    Notification.requestPermission().then(function () {
      updateBell();
      if (Notification.permission === "granted") toast("Notifications on — you'll be pinged when Claude changes a ticket");
    });
  }
  function initNotifications() {
    updateBell();
    if ("Notification" in window && Notification.permission === "default") {
      // Best effort on load; also request on the first click (some browsers need a gesture).
      var once = function () { document.removeEventListener("click", once); if (Notification.permission === "default") Notification.requestPermission().then(updateBell); };
      document.addEventListener("click", once);
      try { Notification.requestPermission().then(updateBell); } catch (_) {}
    }
  }

  function startPolling() {
    // Poll even while hidden so a backgrounded board can still fire notifications
    // (browsers throttle background timers, so it may lag a little when hidden).
    setInterval(function () { refresh(false); }, POLL_MS);
    // And refresh instantly the moment the tab is brought back into view.
    document.addEventListener("visibilitychange", function () { if (!document.hidden) refresh(false); });
  }

  // ---------------- wiring ----------------
  function wire() {
    buildSegments();
    renderFilters();

    $("newBtn").addEventListener("click", function () { openEditor(null); });
    $("notifyBtn").addEventListener("click", requestNotify);
    $("cmtBtn").addEventListener("click", function () { postComment("comment"); });
    $("askBtn").addEventListener("click", function () { postComment("question"); });
    $("addLinkBtn").addEventListener("click", addLink);

    // Notification settings popover.
    var pop = $("settingsPop");
    $("settingsBtn").addEventListener("click", function (e) {
      e.stopPropagation();
      pop.classList.toggle("show");
      $("settingsBtn").classList.toggle("on", pop.classList.contains("show"));
    });
    document.addEventListener("click", function (e) {
      if (pop.classList.contains("show") && !e.target.closest(".popwrap")) { pop.classList.remove("show"); $("settingsBtn").classList.remove("on"); }
    });
    pop.querySelectorAll("input[data-notif]").forEach(function (box) {
      box.checked = notifyPrefs[box.dataset.notif] !== false;
      box.addEventListener("change", function () {
        notifyPrefs[box.dataset.notif] = box.checked;
        saveNotifyPrefs();
        lastSig = ""; renderRail(); renderBoard(); // recompute badges under new prefs
      });
    });

    $("modalClose").addEventListener("click", closeModal);
    $("mCancel").addEventListener("click", closeModal);
    $("mSave").addEventListener("click", saveEditor);
    $("mDelete").addEventListener("click", deleteTicket);
    $("overlay").addEventListener("mousedown", function (e) { if (e.target === $("overlay")) closeModal(); });
    $("lightbox").addEventListener("click", function () { $("lightbox").classList.remove("show"); });

    $("search").addEventListener("input", function (e) { state.query = e.target.value; renderBoard(); });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") { if ($("lightbox").classList.contains("show")) { $("lightbox").classList.remove("show"); return; } if ($("overlay").classList.contains("show")) closeModal(); }
      if ((e.key === "n" || e.key === "N") && !/input|textarea|select/i.test(document.activeElement.tagName) && !$("overlay").classList.contains("show")) { e.preventDefault(); openEditor(null); }
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter" && $("overlay").classList.contains("show")) { e.preventDefault(); saveEditor(); }
    });

    // Image paste (anywhere while modal open) and drop-zone.
    document.addEventListener("paste", function (e) {
      if (!state.editor) return;
      var items = (e.clipboardData || {}).items || [];
      for (var i = 0; i < items.length; i++) { if (items[i].type.indexOf("image/") === 0) { addImageFile(items[i].getAsFile()); e.preventDefault(); } }
    });
    var dz = $("dropzone");
    ["dragenter", "dragover"].forEach(function (ev) { dz.addEventListener(ev, function (e) { e.preventDefault(); dz.classList.add("hot"); }); });
    ["dragleave", "drop"].forEach(function (ev) { dz.addEventListener(ev, function (e) { e.preventDefault(); dz.classList.remove("hot"); }); });
    dz.addEventListener("drop", function (e) { var files = e.dataTransfer.files || []; for (var i = 0; i < files.length; i++) addImageFile(files[i]); });
  }

  // ---------------- boot ----------------
  wire();
  makeIcon();
  initNotifications();
  refresh(true).then(function () {
    // Land on the busiest single board if there's exactly one, else keep "All".
    if (state.projects.length === 1) selectProject(state.projects[0].slug);
    startPolling();
  });
})();
</script>
</body>
</html>
