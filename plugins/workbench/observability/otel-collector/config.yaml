# Generated by workbench install-otel-collector. Loopback only; content is
# stripped before export. Do not add a debug/logging exporter.
extensions:
  file_storage/observer_queue:
    directory: "./collector-queue"
    timeout: "2s"
receivers:
  otlp:
    protocols:
      http:
        endpoint: "127.0.0.1:4318"
processors:
  memory_limiter:
    check_interval: "1s"
    limit_mib: 128
    spike_limit_mib: 32
  filter/signals:
    error_mode: "ignore"
    logs:
      log_record: ["not IsMatch(attributes[\"event.name\"], \"^(claude_code|agent_sdk)\\\\.\")"]
  transform/redact:
    error_mode: "ignore"
    log_statements:
      -        context: "log"
        statements: ["delete(attributes[\"prompt\"]) where attributes[\"prompt\"] != nil", "delete(attributes[\"input\"]) where attributes[\"input\"] != nil", "delete(attributes[\"output\"]) where attributes[\"output\"] != nil", "delete(attributes[\"body\"]) where attributes[\"body\"] != nil", "delete(attributes[\"content\"]) where attributes[\"content\"] != nil", "delete(attributes[\"text\"]) where attributes[\"text\"] != nil", "delete(attributes[\"message\"]) where attributes[\"message\"] != nil", "delete(attributes[\"messages\"]) where attributes[\"messages\"] != nil", "delete(attributes[\"tool_input\"]) where attributes[\"tool_input\"] != nil", "delete(attributes[\"tool_response\"]) where attributes[\"tool_response\"] != nil", "delete(attributes[\"arguments\"]) where attributes[\"arguments\"] != nil", "delete(attributes[\"result\"]) where attributes[\"result\"] != nil", "delete(attributes[\"cwd\"]) where attributes[\"cwd\"] != nil", "delete(attributes[\"transcript_path\"]) where attributes[\"transcript_path\"] != nil", "delete(attributes[\"user\"]) where attributes[\"user\"] != nil", "delete(attributes[\"user_id\"]) where attributes[\"user_id\"] != nil", "delete(attributes[\"email\"]) where attributes[\"email\"] != nil", "delete(attributes[\"authorization\"]) where attributes[\"authorization\"] != nil", "delete(attributes[\"api_key\"]) where attributes[\"api_key\"] != nil", "delete(attributes[\"token\"]) where attributes[\"token\"] != nil", "delete(attributes[\"env\"]) where attributes[\"env\"] != nil", "delete(attributes[\"headers\"]) where attributes[\"headers\"] != nil"]
    trace_statements:
      -        context: "span"
        statements: ["delete(attributes[\"prompt\"]) where attributes[\"prompt\"] != nil", "delete(attributes[\"input\"]) where attributes[\"input\"] != nil", "delete(attributes[\"output\"]) where attributes[\"output\"] != nil", "delete(attributes[\"body\"]) where attributes[\"body\"] != nil", "delete(attributes[\"content\"]) where attributes[\"content\"] != nil", "delete(attributes[\"text\"]) where attributes[\"text\"] != nil", "delete(attributes[\"message\"]) where attributes[\"message\"] != nil", "delete(attributes[\"messages\"]) where attributes[\"messages\"] != nil", "delete(attributes[\"tool_input\"]) where attributes[\"tool_input\"] != nil", "delete(attributes[\"tool_response\"]) where attributes[\"tool_response\"] != nil", "delete(attributes[\"arguments\"]) where attributes[\"arguments\"] != nil", "delete(attributes[\"result\"]) where attributes[\"result\"] != nil", "delete(attributes[\"cwd\"]) where attributes[\"cwd\"] != nil", "delete(attributes[\"transcript_path\"]) where attributes[\"transcript_path\"] != nil", "delete(attributes[\"user\"]) where attributes[\"user\"] != nil", "delete(attributes[\"user_id\"]) where attributes[\"user_id\"] != nil", "delete(attributes[\"email\"]) where attributes[\"email\"] != nil", "delete(attributes[\"authorization\"]) where attributes[\"authorization\"] != nil", "delete(attributes[\"api_key\"]) where attributes[\"api_key\"] != nil", "delete(attributes[\"token\"]) where attributes[\"token\"] != nil", "delete(attributes[\"env\"]) where attributes[\"env\"] != nil", "delete(attributes[\"headers\"]) where attributes[\"headers\"] != nil"]
    metric_statements:
      -        context: "datapoint"
        statements: ["delete(attributes[\"prompt\"]) where attributes[\"prompt\"] != nil", "delete(attributes[\"input\"]) where attributes[\"input\"] != nil", "delete(attributes[\"output\"]) where attributes[\"output\"] != nil", "delete(attributes[\"body\"]) where attributes[\"body\"] != nil", "delete(attributes[\"content\"]) where attributes[\"content\"] != nil", "delete(attributes[\"text\"]) where attributes[\"text\"] != nil", "delete(attributes[\"message\"]) where attributes[\"message\"] != nil", "delete(attributes[\"messages\"]) where attributes[\"messages\"] != nil", "delete(attributes[\"tool_input\"]) where attributes[\"tool_input\"] != nil", "delete(attributes[\"tool_response\"]) where attributes[\"tool_response\"] != nil", "delete(attributes[\"arguments\"]) where attributes[\"arguments\"] != nil", "delete(attributes[\"result\"]) where attributes[\"result\"] != nil", "delete(attributes[\"cwd\"]) where attributes[\"cwd\"] != nil", "delete(attributes[\"transcript_path\"]) where attributes[\"transcript_path\"] != nil", "delete(attributes[\"user\"]) where attributes[\"user\"] != nil", "delete(attributes[\"user_id\"]) where attributes[\"user_id\"] != nil", "delete(attributes[\"email\"]) where attributes[\"email\"] != nil", "delete(attributes[\"authorization\"]) where attributes[\"authorization\"] != nil", "delete(attributes[\"api_key\"]) where attributes[\"api_key\"] != nil", "delete(attributes[\"token\"]) where attributes[\"token\"] != nil", "delete(attributes[\"env\"]) where attributes[\"env\"] != nil", "delete(attributes[\"headers\"]) where attributes[\"headers\"] != nil"]
  batch:
    timeout: "5s"
    send_batch_size: 256
exporters:
  otlphttp/observer:
    endpoint: "http://127.0.0.1:14319"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      storage: "file_storage/observer_queue"
    retry_on_failure:
      enabled: true
service:
  extensions: ["file_storage/observer_queue"]
  telemetry:
    metrics:
      level: "none"
  pipelines:
    logs:
      receivers: ["otlp"]
      processors: ["memory_limiter", "filter/signals", "transform/redact", "batch"]
      exporters: ["otlphttp/observer"]
    traces:
      receivers: ["otlp"]
      processors: ["memory_limiter", "filter/signals", "transform/redact", "batch"]
      exporters: ["otlphttp/observer"]
    metrics:
      receivers: ["otlp"]
      processors: ["memory_limiter", "filter/signals", "transform/redact", "batch"]
      exporters: ["otlphttp/observer"]
