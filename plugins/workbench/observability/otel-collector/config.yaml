# Generated by workbench install-otel-collector. The receiver is loopback-only;
# content is stripped before declared exports. Do not add a debug/logging exporter.
extensions:
  file_storage/observer_queue:
    directory: "./collector-queue"
    timeout: "2s"
    create_directory: true
receivers:
  otlp:
    protocols:
      http:
        endpoint: "127.0.0.1:4318"
processors:
  memory_limiter:
    check_interval: "1s"
    limit_mib: 128
    spike_limit_mib: 32
  filter/signals:
    error_mode: "ignore"
    logs:
      log_record: ["not IsMatch(attributes[\"event.name\"], \"^(claude_code|agent_sdk)\\\\.\")"]
  transform/redact:
    error_mode: "ignore"
    log_statements:
      - context: "log"
        statements: ["delete_key(attributes, \"prompt\")", "delete_key(attributes, \"input\")", "delete_key(attributes, \"output\")", "delete_key(attributes, \"body\")", "delete_key(attributes, \"content\")", "delete_key(attributes, \"text\")", "delete_key(attributes, \"message\")", "delete_key(attributes, \"messages\")", "delete_key(attributes, \"tool_input\")", "delete_key(attributes, \"tool_response\")", "delete_key(attributes, \"arguments\")", "delete_key(attributes, \"result\")", "delete_key(attributes, \"cwd\")", "delete_key(attributes, \"transcript_path\")", "delete_key(attributes, \"user\")", "delete_key(attributes, \"user_id\")", "delete_key(attributes, \"email\")", "delete_key(attributes, \"authorization\")", "delete_key(attributes, \"api_key\")", "delete_key(attributes, \"token\")", "delete_key(attributes, \"env\")", "delete_key(attributes, \"headers\")"]
    trace_statements:
      - context: "span"
        statements: ["delete_key(attributes, \"prompt\")", "delete_key(attributes, \"input\")", "delete_key(attributes, \"output\")", "delete_key(attributes, \"body\")", "delete_key(attributes, \"content\")", "delete_key(attributes, \"text\")", "delete_key(attributes, \"message\")", "delete_key(attributes, \"messages\")", "delete_key(attributes, \"tool_input\")", "delete_key(attributes, \"tool_response\")", "delete_key(attributes, \"arguments\")", "delete_key(attributes, \"result\")", "delete_key(attributes, \"cwd\")", "delete_key(attributes, \"transcript_path\")", "delete_key(attributes, \"user\")", "delete_key(attributes, \"user_id\")", "delete_key(attributes, \"email\")", "delete_key(attributes, \"authorization\")", "delete_key(attributes, \"api_key\")", "delete_key(attributes, \"token\")", "delete_key(attributes, \"env\")", "delete_key(attributes, \"headers\")"]
    metric_statements:
      - context: "datapoint"
        statements: ["set(attributes[\"project.id\"], resource.attributes[\"project.id\"]) where resource.attributes[\"project.id\"] != nil", "delete_key(attributes, \"prompt\")", "delete_key(attributes, \"input\")", "delete_key(attributes, \"output\")", "delete_key(attributes, \"body\")", "delete_key(attributes, \"content\")", "delete_key(attributes, \"text\")", "delete_key(attributes, \"message\")", "delete_key(attributes, \"messages\")", "delete_key(attributes, \"tool_input\")", "delete_key(attributes, \"tool_response\")", "delete_key(attributes, \"arguments\")", "delete_key(attributes, \"result\")", "delete_key(attributes, \"cwd\")", "delete_key(attributes, \"transcript_path\")", "delete_key(attributes, \"user\")", "delete_key(attributes, \"user_id\")", "delete_key(attributes, \"email\")", "delete_key(attributes, \"authorization\")", "delete_key(attributes, \"api_key\")", "delete_key(attributes, \"token\")", "delete_key(attributes, \"env\")", "delete_key(attributes, \"headers\")"]
  batch:
    timeout: "5s"
    send_batch_size: 256
exporters:
  otlphttp/observer:
    endpoint: "http://127.0.0.1:14319"
    encoding: "json"
    compression: "none"
    tls:
      insecure: true
    sending_queue:
      enabled: true
      storage: "file_storage/observer_queue"
    retry_on_failure:
      enabled: true
service:
  extensions: ["file_storage/observer_queue"]
  telemetry:
    metrics:
      level: "none"
  pipelines:
    logs:
      receivers: ["otlp"]
      processors: ["memory_limiter", "filter/signals", "transform/redact", "batch"]
      exporters: ["otlphttp/observer"]
    traces:
      receivers: ["otlp"]
      processors: ["memory_limiter", "filter/signals", "transform/redact", "batch"]
      exporters: ["otlphttp/observer"]
    metrics:
      receivers: ["otlp"]
      processors: ["memory_limiter", "filter/signals", "transform/redact", "batch"]
      exporters: ["otlphttp/observer"]
